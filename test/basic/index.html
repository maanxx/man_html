<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tranning 2026 HTML</title>

    <!-- <link rel="icon" href="https://www.w3schools.com/favicon.ico"> -->
    <link rel="icon" href="public/img/favicon.png" />

    <link rel="stylesheet" href="public/css/style.css" />
    <style>
        h1 {
            background-color: blue;
        }
        
        .exam1{
            font-size: 1rem; 
            margin-bottom: 5rem;       
        }

        .exam1_title{
            font-size: 3.4em;
            text-align: center;
            color: rgb(89, 89, 223);
            margin: 0 0 3rem 0;
        }
        .box4{
            max-width: 80%;    
            margin: auto;
            display: flex;
            justify-content:center;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .box4-item{
            min-width: 15%;
            height: 3rem;
            border-radius: 0.5em;
        }

        .exam2{
            height: 400px;
            position: relative;
        }
        .exam2-item{
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            /* transform: translate(-50%,-50%); */
        }
    </style>
</head>

<body>
    <h1 style="color: #fff">HEELO body 1</h1>
    <img src="public/img/error500.png" alt="error 500" />

    <div class="box">
        <h2>Thông tin</h2>
        <p>nội dung cần hiển thị tại đây</p>
    </div>
    <!-- ctrl + / -->
    <div class="exam1 border">
        <h2 class="exam1_title border">Example 1</h2>
        <div class="box4 border">
            <div class="box4-item border">1</div>
            <div class="box4-item border">2</div>
            <div class="box4-item border">3</div>
            <div class="box4-item border">4</div>
            <div class="box4-item border">5</div>
            <div class="box4-item border">6</div>
            <div class="box4-item border">7</div>
            <div class="box4-item border">8</div>
        </div>
    </div>

    <div class="exam2 border">
        <div class="exam2-item border" style="width: 100px; height: 100px;"></div>

    </div>
   

</body>

</html>
